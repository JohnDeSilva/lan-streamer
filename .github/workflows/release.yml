name: Release

on:
  push:
    branches: [ "main", "rc" ]

permissions:
  contents: write

jobs:
  release:
    name: Bump Version and Tag
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.PAT || secrets.GITHUB_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run lint and typecheck before release
        run: |
          make check-lint
          make typecheck

      - name: Run tests before release
        run: |
          TEST_OS=ubuntu make test
          TEST_OS=fedora make test

      - name: Bump version with Commitizen
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          if [ "${{ github.ref_name }}" = "rc" ]; then
            echo "Bumping pre-release version on rc branch"
            uv run cz bump --prerelease rc --yes --changelog --version-files-only
          else
            echo "Bumping stable version on main branch"
            uv run cz bump --yes --changelog --version-files-only
          fi
          uv lock

      - name: Commit and tag release
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          RELEASE_VERSION="$(uv run cz version --project)"
          git add pyproject.toml src/lan_streamer/__init__.py CHANGELOG.md uv.lock
          git commit -m "chore(release): v${RELEASE_VERSION} [skip ci]" --no-verify
          git tag -a "v${RELEASE_VERSION}" -m "Release v${RELEASE_VERSION}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${RELEASE_VERSION}"
