name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-ubuntu:
    name: Build Executable (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate executable runs
        run: TEST_OS=ubuntu make validate-executable

      - name: Rename executable for artifact
        run: mv dist/lan-streamer-* dist/lan-streamer-ubuntu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lan-streamer-ubuntu
          path: dist/lan-streamer-ubuntu

  build-fedora:
    name: Build Executable (Fedora)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate executable runs
        run: TEST_OS=fedora make validate-executable

      - name: Rename executable for artifact
        run: mv dist/lan-streamer-* dist/lan-streamer-fedora

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lan-streamer-fedora
          path: dist/lan-streamer-fedora

  build-macos:
    name: Build Executable (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Setup FFmpeg (Apple Silicon macOS)
        run: brew install ffmpeg

      - name: Install VLC
        run: brew install --cask vlc

      - name: Build executable
        run: make build

      - name: Validate executable runs
        env:
          PYTHON_VLC_LIB_PATH: /Applications/VLC.app/Contents/MacOS/lib/libvlc.dylib
        run: make validate-executable

      - name: Prepare macOS Artifact
        run: |
          cd dist
          mkdir -p dmg_root
          mv lan-streamer-*.app "dmg_root/Lan Streamer.app"
          ln -s /Applications dmg_root/Applications
          hdiutil create -volname "Lan Streamer" -srcfolder dmg_root -ov -format UDZO lan-streamer-macos.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lan-streamer-macos
          path: dist/lan-streamer-macos.dmg

  build-windows:
    name: Build Executable (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install VLC
        run: choco install vlc -y

      - name: Build executable
        shell: bash
        run: uv run pyinstaller --noconfirm lan-streamer.spec

      - name: Validate executable runs
        shell: bash
        env:
          PYTHON_VLC_LIB_PATH: 'C:\Program Files\VideoLAN\VLC\libvlc.dll'
          LAN_STREAMER_DRY_RUN: '1'
          QT_QPA_PLATFORM: offscreen
        run: for f in ./dist/lan-streamer-*.exe; do "$f"; break; done

      - name: Rename executable for artifact
        shell: bash
        run: mv dist/lan-streamer-*.exe dist/lan-streamer-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lan-streamer-windows
          path: dist/lan-streamer-windows.exe

  release:
    name: Create Release
    needs: [build-ubuntu, build-fedora, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Changelog Section
        run: |
          python -c '
          with open("CHANGELOG.md", "r", encoding="utf-8") as f:
              lines = f.readlines()
          notes = []
          header_count = 0
          for line in lines:
              if line.startswith("## v"):
                  header_count += 1
                  if header_count > 1:
                      break
              if header_count == 1:
                  notes.append(line)
          with open("release_notes.md", "w", encoding="utf-8") as f:
              f.writelines(notes)
          '

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets
          merge-multiple: true

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*
          body_path: release_notes.md
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
