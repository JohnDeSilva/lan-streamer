name: Build Executables

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build-ubuntu:
    name: Build Executable (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install system dependencies for Qt/PySide6 and VLC/ffmpeg
        run: |
          sudo add-apt-repository -y ppa:ubuntuhandbook1/ffmpeg7
          sudo apt-get update
          sudo apt-get install -y \
            vlc \
            ffmpeg \
            libegl1 \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libxcb-shape0

      - name: Build executable
        run: make build

      - name: Validate executable runs
        run: make validate-executable

      - name: Rename executable for artifact
        run: mv dist/lan-streamer dist/lan-streamer-ubuntu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lan-streamer-ubuntu
          path: dist/lan-streamer-ubuntu


  build-fedora:
    name: Build Executable (Fedora)
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Install bootstrapping dependencies
        run: |
          dnf update -y
          dnf install -y git make tar xz findutils shadow-utils
          # Enable RPM Fusion for VLC
          dnf install -y https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-"$(rpm -E %fedora)".noarch.rpm https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-"$(rpm -E %fedora)".noarch.rpm

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install system dependencies for Qt/PySide6 and VLC/ffmpeg
        run: |
          dnf install -y \
            vlc \
            ffmpeg \
            mesa-libGL-devel \
            mesa-libEGL-devel \
            libxkbcommon-x11 \
            binutils \
            xcb-util-wm \
            xcb-util-image \
            xcb-util-keysyms \
            xcb-util-renderutil

      - name: Build executable
        run: make build

      - name: Validate executable runs
        run: make validate-executable

      - name: Rename executable for artifact
        run: mv dist/lan-streamer dist/lan-streamer-fedora

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lan-streamer-fedora
          path: dist/lan-streamer-fedora


  build-macos:
    name: Build Executable (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Setup FFmpeg (Apple Silicon macOS)
        run: brew install ffmpeg

      - name: Install VLC
        run: brew install --cask vlc

      - name: Build executable
        run: make build

      - name: Validate executable runs
        env:
          PYTHON_VLC_LIB_PATH: /Applications/VLC.app/Contents/MacOS/lib/libvlc.dylib
        run: make validate-executable

      - name: Prepare macOS Artifact
        run: |
          cd dist
          mv lan-streamer.app lan-streamer-macos.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lan-streamer-macos.app
          path: dist/lan-streamer-macos.app


  build-windows:
    name: Build Executable (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install VLC
        run: choco install vlc -y

      - name: Build executable
        shell: bash
        run: uv run pyinstaller --noconfirm --onefile --windowed --paths src src/entrypoint.py --name lan-streamer

      - name: Validate executable runs
        shell: bash
        env:
          PYTHON_VLC_LIB_PATH: 'C:\Program Files\VideoLAN\VLC\libvlc.dll'
          LAN_STREAMER_DRY_RUN: '1'
          QT_QPA_PLATFORM: offscreen
        run: ./dist/lan-streamer.exe

      - name: Rename executable for artifact
        shell: bash
        run: mv dist/lan-streamer.exe dist/lan-streamer-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lan-streamer-windows
          path: dist/lan-streamer-windows.exe

  release:
    name: Create Release
    needs: [build-ubuntu, build-fedora, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets
          merge-multiple: true

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*
