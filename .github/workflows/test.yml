name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-ubuntu:
    name: Test (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install system dependencies for Qt/PySide6 and VLC/ffmpeg
        run: |
          sudo add-apt-repository -y ppa:ubuntuhandbook1/ffmpeg7
          sudo apt-get update
          sudo apt-get install -y \
            vlc \
            ffmpeg \
            libegl1 \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libxcb-shape0

      - name: Run unit tests with coverage check
        run: make test

      - name: Build executable
        run: make build

      - name: Validate executable runs
        run: make validate-executable


  test-fedora:
    name: Test (Fedora)
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Install bootstrapping dependencies
        run: |
          dnf update -y
          dnf install -y git make tar xz findutils shadow-utils
          # Enable RPM Fusion for VLC
          dnf install -y https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-$(rpm -E %fedora).noarch.rpm

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install system dependencies for Qt/PySide6 and VLC/ffmpeg
        run: |
          dnf install -y \
            vlc \
            ffmpeg \
            mesa-libGL-devel \
            mesa-libEGL-devel \
            libxkbcommon-x11 \
            xcb-util-wm \
            xcb-util-image \
            xcb-util-keysyms \
            xcb-util-renderutil

      - name: Run unit tests
        run: make test

      - name: Build executable
        run: make build

      - name: Validate executable runs
        run: make validate-executable


  test-macos:
    name: Test (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install VLC
        run: brew install --cask vlc

      - name: Run unit tests
        env:
          PYTHON_VLC_LIB_PATH: /Applications/VLC.app/Contents/MacOS/lib/libvlc.dylib
        run: make test

      - name: Build executable
        run: make build

      - name: Validate executable runs
        env:
          PYTHON_VLC_LIB_PATH: /Applications/VLC.app/Contents/MacOS/lib/libvlc.dylib
        run: make validate-executable


  test-windows:
    name: Test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install VLC
        run: choco install vlc -y

      - name: Run unit tests
        shell: bash
        env:
          PYTHON_VLC_LIB_PATH: 'C:\Program Files\VideoLAN\VLC\libvlc.dll'
          LAN_STREAMER_DB: ./test_library.db
          PYTHONPATH: src
          QT_QPA_PLATFORM: offscreen
        run: |
          uv run python -m alembic upgrade head
          uv run pytest --cov-fail-under=90 -m "not load" tests/
          rm -f ./test_library.db ./test_library.db-wal ./test_library.db-shm

      - name: Build executable
        shell: bash
        run: uv run pyinstaller --onefile --paths src src/entrypoint.py --name lan-streamer

      - name: Validate executable runs
        shell: bash
        env:
          PYTHON_VLC_LIB_PATH: 'C:\Program Files\VideoLAN\VLC\libvlc.dll'
          LAN_STREAMER_DRY_RUN: '1'
          QT_QPA_PLATFORM: offscreen
        run: ./dist/lan-streamer.exe

