name: Test

on:
  workflow_call:

jobs:
  check-source-branch:
    name: Enforce Merge from rc to main
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Verify source branch
        env:
          PR_TARGET_BRANCH: ${{ github.base_ref }}
          PR_SOURCE_BRANCH: ${{ github.head_ref }}
        run: |
          echo "PR target branch: $PR_TARGET_BRANCH"
          echo "PR source branch: $PR_SOURCE_BRANCH"
          if [[ "$PR_SOURCE_BRANCH" != rc* ]]; then
            echo "ERROR: Only pull requests from a branch with the 'rc' prefix are allowed to target 'main'!"
            exit 1
          fi

  test-ubuntu:
    name: Test (Ubuntu)
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run unit tests with coverage check
        run: TEST_OS=ubuntu make test

      - name: Validate executable runs
        run: TEST_OS=ubuntu make validate-executable


  test-fedora:
    name: Test (Fedora)
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run unit tests
        run: TEST_OS=fedora make test

      - name: Validate executable runs
        run: TEST_OS=fedora make validate-executable
