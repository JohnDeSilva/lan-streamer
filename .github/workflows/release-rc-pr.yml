name: Release (RC Branch PR Merges)

on:
  pull_request:
    types: [closed]
    branches:
      - 'rc*'
      - 'rc/**'

permissions:
  contents: write

jobs:
  release-rc-pr:
    name: Bump version on RC PR Merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}
          token: ${{ secrets.RELEASE_TOKEN || secrets.PAT || secrets.GITHUB_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version and Tag
        env:
          UV_CACHE_DIR: /tmp/uv-cache
          BRANCH_NAME: ${{ github.event.pull_request.base.ref }}
        run: |
          # Fetch all tags from remote to ensure we have the latest
          git fetch --tags

          # Bump version in files and update changelog using cz bump's native git operations
          uv run cz bump --yes --changelog --tag-format "rc-\$version" --bump-message "chore(release): rc-{version}"

          # Read bumped version
          RELEASE_VERSION="$(uv run cz version --project)"
          echo "Bumped to RC version: ${RELEASE_VERSION}"

          # Update lock file with the new version and amend the commit
          uv lock
          git add uv.lock
          git commit --amend --no-edit --no-verify

          # Re-create tag matching the rc- prefix pointing to the amended commit
          git tag -d "rc-${RELEASE_VERSION}"
          git tag -a "rc-${RELEASE_VERSION}" -m "Release rc-${RELEASE_VERSION}"

          # Push commit and tag back to current branch
          git push origin "HEAD:$BRANCH_NAME"
          git push origin "rc-${RELEASE_VERSION}"
