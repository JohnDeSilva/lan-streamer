repos:
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: commitizen-branch
        name: commitizen check branch
        entry: >-
          bash -c 'if [ -n "$PRE_COMMIT_FROM_REF" ]; then .venv/bin/cz check --rev-range "$PRE_COMMIT_FROM_REF..$PRE_COMMIT_TO_REF"; else echo "Skipping branch check: no revision range provided."; fi'
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: mypy
        name: mypy
        entry: make typecheck
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]
      - id: lint-check
        name: lint check
        entry: make check-lint
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]