name: Release (RC Branch Pushes)

on:
  push:
    branches:
      - 'rc*'
      - 'rc/**'

permissions:
  contents: write

jobs:
  call-lint:
    if: ${{ !github.event.created }}
    uses: ./.github/workflows/lint.yml
  call-test:
    if: ${{ !github.event.created }}
    uses: ./.github/workflows/test.yml

  release-rc-push:
    name: Create pre-release tag on direct push
    needs: [call-lint, call-test]
    runs-on: ubuntu-latest
    if: ${{ !github.event.created && !contains(github.event.head_commit.message, '[skip ci]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
          token: ${{ secrets.RELEASE_TOKEN || secrets.PAT || secrets.GITHUB_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Dash Pre-release Tag
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch all tags from remote to ensure we have the latest
          git fetch --tags

          # Skip if commit is from github-actions[bot] or message contains [skip ci]
          COMMIT_MSG=$(git log -1 --pretty=%B)
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)
          if [[ "$COMMIT_MSG" == *"[skip ci]"* ]] || [[ "$COMMIT_AUTHOR" == *"github-actions"* ]]; then
            echo "Skipping tag creation for automated push/release commit."
            exit 0
          fi

          # Skip if this commit is associated with a merged PR (handled by PR merge workflow)
          MERGED_PR=$(gh api "/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '.[] | select(.merged_at != null) | .number' | head -n 1)
          if [ -n "$MERGED_PR" ]; then
            echo "Skipping push release because commit is associated with merged PR #${MERGED_PR} (handled by PR merge workflow)."
            exit 0
          fi

          # Skip if it is a merge commit or PR merge message (handled by PR merge workflow)
          PARENT_COUNT=$(git rev-list --parents -n 1 HEAD | wc -w)
          if [ "$PARENT_COUNT" -gt 2 ] || echo "$COMMIT_MSG" | grep -qE "Merge pull request|Merge branch|\(#[0-9]+\)"; then
            echo "Skipping push release because this is a PR merge commit (handled by PR merge workflow)."
            exit 0
          fi

          # Skip if the current commit is already tagged
          if git tag --points-at HEAD | grep -qE "^(v|rc-)"; then
            echo "Current commit is already tagged. Skipping tag creation."
            exit 0
          fi

          # Read version from pyproject.toml
          VERSION="$(uv run cz version --project)"

          # Find the latest tag matching rc-<VERSION>
          LATEST_TAG=$(git tag -l "rc-${VERSION}*" --sort=-v:refname | head -n 1)
          echo "Latest tag found: ${LATEST_TAG}"

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "rc-${VERSION}" ]; then
            NEXT_TAG="rc-${VERSION}-1"
          else
            # Extract the suffix number after the last dash
            SUFFIX="${LATEST_TAG##*-}"
            if [[ "$SUFFIX" =~ ^[0-9]+$ ]]; then
              NEXT_SUFFIX=$((SUFFIX + 1))
              NEXT_TAG="rc-${VERSION}-${NEXT_SUFFIX}"
            else
              NEXT_TAG="rc-${VERSION}-1"
            fi
          fi
          echo "Creating tag: ${NEXT_TAG}"

          # Update CHANGELOG.md for this pre-release tag using our python helper script
          python .github/scripts/update_pre_release_changelog.py "$LATEST_TAG" "$NEXT_TAG"

          # Commit changelog update back to current branch
          git add CHANGELOG.md
          git commit -m "chore(release): pre-release ${NEXT_TAG}" --no-verify

          # Tag the commit and push it
          git tag -a "$NEXT_TAG" -m "Pre-release $NEXT_TAG"
          git push origin "HEAD:$BRANCH_NAME"
          git push origin "$NEXT_TAG"
